name: Publish Loop CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag (latest, next, beta, etc.)
        required: false
        default: latest
        type: string
      dry_run:
        description: Pack only, do not publish
        required: false
        default: false
        type: boolean
      skip_checks:
        description: Skip loop ci gate before publish
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require npm token for real publish
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is required when dry_run is false."
            exit 1
          fi

      - name: Publish Loop CLI stack
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.skip_checks }}" = "true" ]; then
            ARGS="$ARGS --skip-checks"
          fi
          TAG="${{ inputs.tag }}"
          if [ -n "$TAG" ]; then
            ARGS="$ARGS --tag $TAG"
          fi
          node tools/release/publish-loop-cli-stack.mjs $ARGS
