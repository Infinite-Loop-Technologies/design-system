name = "nitric"
type = "cli"

[resolve]
git-url = "https://github.com/nitrictech/cli"
version-pattern = "^v((?<major>[0-9]+)\\.(?<minor>[0-9]+)\\.(?<patch>[0-9]+))"

[install]
download-url = "https://github.com/nitrictech/cli/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/nitrictech/cli/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "x86_64"

[platform.linux]
download-file = "nitric_{version}_Linux_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.macos]
download-file = "nitric_{version}_macOS_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.windows]
download-file = "nitric_{version}_Windows_{arch}.zip"
checksum-file = "checksums.txt"
